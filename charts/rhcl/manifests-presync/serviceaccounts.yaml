# Pre-create operator ServiceAccounts with imagePullSecrets
# so images can be pulled from registry.redhat.io before Helm install completes
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kuadrant-operator-controller-manager
  namespace: kuadrant-operators
imagePullSecrets:
  - name: redhat-pull-secret
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: authorino-operator
  namespace: kuadrant-operators
imagePullSecrets:
  - name: redhat-pull-secret
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: limitador-operator-controller-manager
  namespace: kuadrant-operators
imagePullSecrets:
  - name: redhat-pull-secret
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: dns-operator-controller-manager
  namespace: kuadrant-operators
imagePullSecrets:
  - name: redhat-pull-secret
