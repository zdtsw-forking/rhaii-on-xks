{{- if .Values.images.pullSecret.create }}
# Pre-create the Authorino component ServiceAccount with imagePullSecrets.
# The Authorino operator will adopt this SA when it creates the Authorino instance.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: authorino-authorino
  namespace: {{ .Values.namespaces.instances }}
  labels:
    {{- include "rhcl.labels" . | nindent 4 }}
imagePullSecrets:
  - name: {{ .Values.images.pullSecret.name }}
{{- end }}
