{{- if .Values.operators.kuadrant.enabled }}
apiVersion: {{ include "rhcl.deployment.apiVersion" . }}
kind: Deployment
metadata:
  name: kuadrant-operator-controller-manager
  namespace: {{ .Values.namespaces.operators }}
  labels:
    {{- include "rhcl.labels" . | nindent 4 }}
    app.kubernetes.io/component: kuadrant-operator
    control-plane: controller-manager
spec:
  replicas: {{ .Values.operators.kuadrant.replicas }}
  selector:
    matchLabels:
      control-plane: controller-manager
      app.kubernetes.io/component: kuadrant-operator
  template:
    metadata:
      labels:
        control-plane: controller-manager
        app.kubernetes.io/component: kuadrant-operator
    spec:
      serviceAccountName: kuadrant-operator-controller-manager
      terminationGracePeriodSeconds: 10
      securityContext:
        {{- $defaults := dict "runAsNonRoot" true "seccompProfile" (dict "type" "RuntimeDefault") }}
        {{- toYaml (mergeOverwrite $defaults (.Values.operators.kuadrant.podSecurityContext | default dict)) | nindent 8 }}
      containers:
        - name: manager
          image: {{ include "rhcl.image" (dict "registry" .Values.images.registry "repository" .Values.images.operators.kuadrant.repository "digest" .Values.images.operators.kuadrant.digest) }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          args:
            - --health-probe-bind-address=:8081
            - --metrics-bind-address=:8080
            - --leader-elect
          env:
            - name: EXTENSIONS_DIR
              value: /extensions
            - name: RELATED_IMAGE_WASMSHIM
              value: {{ include "rhcl.image" (dict "registry" (.Values.images.components.wasmshim.registry | default .Values.images.registry) "repository" .Values.images.components.wasmshim.repository "digest" .Values.images.components.wasmshim.digest) }}
            - name: OPERATOR_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            {{- if eq .Values.platform.type "openshift" }}
            - name: ISTIO_GATEWAY_CONTROLLER_NAMES
              value: openshift.io/gateway-controller/v1
            {{- end }}
            {{- if .Values.operators.kuadrant.env }}
            {{- toYaml .Values.operators.kuadrant.env | nindent 12 }}
            {{- end }}
          ports:
            - name: metrics
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.operators.kuadrant.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: tmp-kuadrant
              mountPath: /tmp/kuadrant
      volumes:
        - name: tmp-kuadrant
          emptyDir: {}
      {{- with .Values.operators.kuadrant.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.operators.kuadrant.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.operators.kuadrant.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
