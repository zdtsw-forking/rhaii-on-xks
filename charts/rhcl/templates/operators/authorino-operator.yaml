{{- if .Values.operators.authorino.enabled }}
apiVersion: {{ include "rhcl.deployment.apiVersion" . }}
kind: Deployment
metadata:
  name: authorino-operator
  namespace: {{ .Values.namespaces.operators }}
  labels:
    {{- include "rhcl.labels" . | nindent 4 }}
    app.kubernetes.io/component: authorino-operator
    control-plane: controller-manager
spec:
  replicas: {{ .Values.operators.authorino.replicas }}
  selector:
    matchLabels:
      control-plane: controller-manager
      app.kubernetes.io/component: authorino-operator
  template:
    metadata:
      labels:
        control-plane: controller-manager
        app.kubernetes.io/component: authorino-operator
    spec:
      serviceAccountName: authorino-operator
      terminationGracePeriodSeconds: 10
      securityContext:
        {{- $defaults := dict "runAsNonRoot" true "seccompProfile" (dict "type" "RuntimeDefault") }}
        {{- toYaml (mergeOverwrite $defaults (.Values.operators.authorino.podSecurityContext | default dict)) | nindent 8 }}
      containers:
        - name: manager
          image: {{ include "rhcl.image" (dict "registry" .Values.images.registry "repository" .Values.images.operators.authorino.repository "digest" .Values.images.operators.authorino.digest) }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          env:
            - name: RELATED_IMAGE_AUTHORINO
              value: {{ include "rhcl.image" (dict "registry" .Values.images.registry "repository" .Values.images.components.authorino.repository "digest" .Values.images.components.authorino.digest) }}
            {{- if .Values.operators.authorino.env }}
            {{- toYaml .Values.operators.authorino.env | nindent 12 }}
            {{- end }}
          ports:
            - name: metrics
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.operators.authorino.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            seccompProfile:
              type: RuntimeDefault
      {{- with .Values.operators.authorino.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.operators.authorino.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.operators.authorino.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
