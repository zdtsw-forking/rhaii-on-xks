{{- if and .Values.rbac.create .Values.operators.authorino.enabled }}
# Pre-created ClusterRoles for the Authorino auth server component.
# The Authorino operator creates ClusterRoleBindings for these at runtime
# when it deploys the Authorino instance.
apiVersion: {{ include "rhcl.rbac.apiVersion" . }}
kind: ClusterRole
metadata:
  name: authorino-manager-role
  labels:
    {{- include "rhcl.labels" . | nindent 4 }}
rules:
  - apiGroups: [authorino.kuadrant.io]
    resources: [authconfigs]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [authorino.kuadrant.io]
    resources: [authconfigs/status]
    verbs: [get, patch, update]
  - apiGroups: [coordination.k8s.io]
    resources: [leases]
    verbs: [create, get, list, update]
  - apiGroups: [""]
    resources: [secrets]
    verbs: [get, list, watch]
---
apiVersion: {{ include "rhcl.rbac.apiVersion" . }}
kind: ClusterRole
metadata:
  name: authorino-manager-k8s-auth-role
  labels:
    {{- include "rhcl.labels" . | nindent 4 }}
rules:
  - apiGroups: [authentication.k8s.io]
    resources: [tokenreviews]
    verbs: [create]
  - apiGroups: [authorization.k8s.io]
    resources: [subjectaccessreviews]
    verbs: [create]
{{- end }}
