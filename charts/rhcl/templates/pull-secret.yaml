{{- if .Values.images.pullSecret.create }}
{{- if .Values.images.pullSecret.dockerConfigJson }}
# Pull secret for operator namespace
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.images.pullSecret.name }}
  namespace: {{ .Values.namespaces.operators }}
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: {{ .Values.images.pullSecret.dockerConfigJson | b64enc }}
---
# Pull secret for instance namespace (Authorino/Limitador components)
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.images.pullSecret.name }}
  namespace: {{ .Values.namespaces.instances }}
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: {{ .Values.images.pullSecret.dockerConfigJson | b64enc }}
---
# WasmPlugin pull secret in instance namespace
apiVersion: v1
kind: Secret
metadata:
  name: wasm-plugin-pull-secret
  namespace: {{ .Values.namespaces.instances }}
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: {{ .Values.images.pullSecret.dockerConfigJson | b64enc }}
{{- range .Values.gatewayNamespaces }}
---
# WasmPlugin pull secret for gateway namespace: {{ . }}
# Required so the Envoy proxy can pull the WASM shim image
apiVersion: v1
kind: Secret
metadata:
  name: wasm-plugin-pull-secret
  namespace: {{ . }}
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: {{ $.Values.images.pullSecret.dockerConfigJson | b64enc }}
{{- end }}
{{- end }}
{{- end }}
