# Infrastructure CR - required for non-OpenShift clusters
# The operator checks for infrastructure.config.openshift.io/cluster
# Skip this on OpenShift clusters where it already exists
{{- if .Values.createInfrastructure }}
apiVersion: config.openshift.io/v1
kind: Infrastructure
metadata:
  name: cluster
spec: {}
status:
  controlPlaneTopology: HighlyAvailable
  infrastructureTopology: HighlyAvailable
  platform: None
{{- end }}
