kind: ConfigMap
metadata:
  name: kserve-parameters
  namespace: opendatahub
---
apiVersion: v1
data:
  CA_SECRET_NAME: opendatahub-ca
  CA_SECRET_NAMESPACE: cert-manager
  ISSUER_REF_GROUP: cert-manager.io
  ISSUER_REF_KIND: ClusterIssuer
  ISSUER_REF_NAME: opendatahub-ca-issuer
  ISTIO_CA_CERTIFICATE_PATH: /var/run/secrets/opendatahub/ca.crt
  NAMESPACE: opendatahub
kind: ConfigMap
metadata:
  name: odh-xks-kserve-parameters
  namespace: opendatahub
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/component: controller
    control-plane: llmisvc-controller-manager
    controller-tools.k8s.io: "1.0"
  name: llmisvc-controller-manager-service
  namespace: opendatahub
spec:
  ports:
    - name: https
      port: 8443
      protocol: TCP
      targetPort: metrics
  selector:
    control-plane: llmisvc-controller-manager
    controller-tools.k8s.io: "1.0"
---
apiVersion: v1
kind: Service
metadata:
  name: llmisvc-webhook-server-service
  namespace: opendatahub
spec:
  ports:
    - name: https
      port: 443
      targetPort: webhook-server
  selector:
    control-plane: llmisvc-controller-manager
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/component: controller
    app.kubernetes.io/name: llmisvc-controller-manager
    control-plane: llmisvc-controller-manager
    controller-tools.k8s.io: "1.0"
  name: llmisvc-controller-manager
  namespace: opendatahub
spec:
  selector:
    matchLabels:
      control-plane: llmisvc-controller-manager
      controller-tools.k8s.io: "1.0"
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
      labels:
        app.kubernetes.io/component: controller
        app.kubernetes.io/name: llmisvc-controller-manager
        control-plane: llmisvc-controller-manager
        controller-tools.k8s.io: "1.0"
    spec:
      containers:
        - args:
            - --metrics-addr=127.0.0.1:8443
            - --leader-elect
          command:
            - /manager
          env:
            - name: SERVICE_CA_SIGNING_SECRET_NAME
              value: opendatahub-ca
            - name: SERVICE_CA_SIGNING_SECRET_NAMESPACE
              value: cert-manager
            - name: ISTIO_CA_CERTIFICATE_PATH
              value: /var/run/secrets/opendatahub/ca.crt
            - name: LLMISVC_AUTH_DISABLED
              value: "true"
            - name: LLMISVC_MONITORING_DISABLED
              value: "true"
            - name: LLMISVC_SCC_DISABLED
              value: "true"
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          image: registry.redhat.io/rhoai/odh-kserve-llmisvc-controller-rhel9@sha256:95dd6ec82ec9b1ff4324432e2332f09b01e143d0fdf75c3f848eddd755e6310f
          imagePullPolicy: Always
          livenessProbe:
            failureThreshold: 5
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          name: manager
          ports:
            - containerPort: 9443
              name: webhook-server
              protocol: TCP
            - containerPort: 8443
              name: metrics
              protocol: TCP
          readinessProbe:
            failureThreshold: 5
            httpGet:
