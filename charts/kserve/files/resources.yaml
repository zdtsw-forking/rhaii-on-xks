apiVersion: v1
kind: ServiceAccount
metadata:
  labels:
    app.kubernetes.io/component: controller
    app.kubernetes.io/instance: llmisvc-controller-manager
    app.kubernetes.io/name: llmisvc-controller-manager
  name: llmisvc-controller-manager
  namespace: opendatahub
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: llmisvc-leader-election-role
  namespace: opendatahub
rules:
  - apiGroups:
      - coordination.k8s.io
    resources:
      - leases
    verbs:
      - create
      - get
      - list
      - update
---
aggregationRule:
  clusterRoleSelectors:
    - matchLabels:
        rbac.authorization.k8s.io/aggregate-to-kserve-admin: "true"
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    rbac.authorization.k8s.io/aggregate-to-admin: "true"
  name: kserve-admin
rules: []
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    rbac.authorization.k8s.io/aggregate-to-edit: "true"
    rbac.authorization.k8s.io/aggregate-to-kserve-admin: "true"
  name: kserve-edit
rules:
  - apiGroups:
      - serving.kserve.io
    resources:
      - inferenceservices
      - llminferenceserviceconfigs
      - llminferenceservices
      - servingruntimes
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kserve-llmisvc-distro-role
rules:
  - apiGroups:
      - networking.istio.io
    resources:
      - destinationrules
    verbs:
      - create
      - delete
      - get
      - list
      - update
      - watch
  - apiGroups:
      - security.openshift.io
    resourceNames:
      - openshift-ai-llminferenceservice-scc
    resources:
      - securitycontextconstraints
    verbs:
      - use
---
