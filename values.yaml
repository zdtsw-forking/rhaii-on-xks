# rhaii-on-xks configuration

# =============================================================================
# Pull Secret Configuration
# =============================================================================
# Option 1: Use system podman auth (recommended)
#   Requires: ~/.config/containers/auth.json
#   Setup: cp ~/pull-secret.txt ~/.config/containers/auth.json
useSystemPodmanAuth: true

# Option 2: Use pull secret file directly (set useSystemPodmanAuth: false)
pullSecretFile: ""  # e.g., ~/pull-secret.txt

# =============================================================================
# Operators
# =============================================================================

# cert-manager operator (required for TLS)
certManager:
  enabled: true
  createInfrastructure: false  # false for OpenShift, true for non-OpenShift

# sail-operator / Istio (required for gateway)
sailOperator:
  enabled: true
  # Gateway API CRD installation - set to false on OpenShift (managed by Ingress Operator)
  installGatewayAPICRDs: false  # false for OpenShift, true for non-OpenShift

# lws-operator (optional - for multi-node workloads)
lwsOperator:
  enabled: true

# =============================================================================
# KServe
# =============================================================================

# KServe OCI chart version (dev variant until official builds are on registry.redhat.io)
# Format: {base_version}-dev-{git_sha} (e.g., 3.4.0-ea.1-dev-610f4a4)
# Note: Use dashes not underscores - Helm requires valid semantic versioning
# Available versions: https://github.com/opendatahub-io/rhaii-on-xks/pkgs/container/kserve-rhaii-xks
kserveChartVersion: "3.4.0-ea.1-dev-610f4a4"
